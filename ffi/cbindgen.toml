language = "C"
header = """/*
 * Telaradio C ABI — auto-generated by cbindgen.
 * Do not edit by hand; regenerate with `cargo build -p telaradio-ffi` (or
 * `make ffi` from the workspace root).
 */"""
include_guard = "TELARADIO_FFI_H"
pragma_once = true
no_includes = true
sys_includes = ["stdint.h", "stddef.h"]
documentation = true
documentation_style = "doxy"

# Recipe and WavBuffer are opaque types defined in other crates. cbindgen
# can't see their definitions (parse_deps = false) so we forward-declare
# them here. The renames in [export.rename] line up the C names.
after_includes = """

/* Forward declarations for types owned by other crates in the workspace. */
typedef struct TrRecipe TrRecipe;
typedef struct TrWavBuffer TrWavBuffer;
"""

[parse]
# Don't try to expand external crates' types. Recipe and WavBuffer become
# opaque structs in the generated header.
parse_deps = false

[export]
# Prefix-rename to keep the C namespace tidy.
[export.rename]
"Recipe" = "TrRecipe"
"WavBuffer" = "TrWavBuffer"
